apiVersion: batch/v1
kind: Job
metadata:
  name: jmeter-solr-load-test
  namespace: load-testing
spec:
  ttlSecondsAfterFinished: 604800  # clean up after 7 days
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: jmeter
          image: ghcr.io/notch8/jmeter:5.6.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
              jmeter \
                -n \
                -t /test-plans/solr_test_plan.jmx \
                -Jhost=solr.solr.svc.cluster.local \
                -Jport=8983 \
                -Jkeyword_file_full_path=/keywords/keywords.csv \
                -Jkw_expected_result_count=0 \
                -Jsitemap_expected_result_count=0 \
                -Jusername=admin \
                "-Jpassword=${SOLR_PASSWORD}" \
                -e \
                -l /results/test-report-${TIMESTAMP}.jtl \
                -o /results/html-report-${TIMESTAMP}
              sleep 3600
          env:
            - name: SOLR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: solr-admin-credentials
                  key: admin-password
          volumeMounts:
            - name: results
              mountPath: /results
            - name: keywords
              mountPath: /keywords
            - name: cores
              mountPath: /cores
            - name: test-plans
              mountPath: /test-plans
          resources:
            requests:
              memory: "2.5Gi"
              cpu: "500m"
            limits:
              memory: "3Gi"
              cpu: "1"
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: jmeter-results
        - name: keywords
          configMap:
            name: jmeter-keywords
        - name: cores
          configMap:
            name: jmeter-cores
        - name: test-plans
          configMap:
            name: jmeter-test-plans
