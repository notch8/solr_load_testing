# Syncs Solr admin password from 1Password. Username is "admin".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: solr-admin-credentials
  namespace: load-testing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: solr-admin-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-password
      remoteRef:
        key: solr-admin-r2-besties/password
